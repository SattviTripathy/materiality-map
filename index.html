<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Materiality Map — ESG Disclosure Engine for Utilities</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <style>
    :root {
      --bg: #faf8fc;
      --bg-card: #ffffff;
      --ink: #1a0a2e;
      --ink-2: #2e2438;
      --ink-3: #5d5466;
      --ink-4: #9a93a4;
      --line: #ece5f5;
      --line-2: #d8cfe5;
      --accent: #5b00a8;
      --accent-2: #7a1fd4;
      --signal: #a01060;
      --signal-soft: #f5e0ec;
      --gold: #6e5818;
      --warn-bg: #fdf6e3;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--ink);
      font-feature-settings: 'ss01', 'cv11';
    }
    .display-font { font-family: 'Fraunces', Georgia, serif; font-feature-settings: 'ss01'; letter-spacing: -0.02em; }
    .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }
    .num { font-variant-numeric: tabular-nums; }

    .stage-dot { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .fade-in { animation: fadeIn 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    .field-input {
      width: 100%;
      padding: 12px 14px;
      background: var(--bg-card);
      border: 1px solid var(--line);
      border-radius: 4px;
      font-family: inherit;
      font-size: 14px;
      color: var(--ink);
      transition: border-color 0.15s;
    }
    .field-input:focus { outline: none; border-color: var(--accent); }
    textarea.field-input { resize: vertical; min-height: 100px; line-height: 1.6; }

    .chip {
      display: inline-flex;
      align-items: center;
      padding: 7px 12px;
      border: 1px solid var(--line-2);
      border-radius: 2px;
      font-size: 13px;
      cursor: pointer;
      background: var(--bg-card);
      transition: all 0.15s;
      font-weight: 500;
      font-family: inherit;
      color: var(--ink);
    }
    .chip:hover { border-color: var(--ink-3); }
    .chip.active { background: var(--ink); color: var(--bg); border-color: var(--ink); }

    .btn-primary {
      background: var(--ink);
      color: var(--bg);
      border: none;
      padding: 13px 26px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      border-radius: 2px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: all 0.15s;
      letter-spacing: 0.02em;
    }
    .btn-primary:hover:not(:disabled) { background: var(--accent); }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-secondary {
      background: transparent;
      color: var(--ink);
      border: 1px solid var(--line-2);
      padding: 12px 22px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      border-radius: 2px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: all 0.15s;
    }
    .btn-secondary:hover { border-color: var(--ink); }
    .btn-ghost {
      background: transparent;
      color: var(--ink-3);
      border: none;
      padding: 6px 10px;
      font-family: inherit;
      font-size: 13px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: color 0.15s;
    }
    .btn-ghost:hover { color: var(--ink); }

    table.disc-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    table.disc-table th {
      text-align: left;
      font-weight: 600;
      font-size: 11px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--ink-3);
      padding: 12px 14px;
      border-bottom: 1px solid var(--line-2);
      background: var(--bg);
      position: sticky; top: 0;
    }
    table.disc-table td {
      padding: 11px 14px;
      border-bottom: 1px solid var(--line);
      vertical-align: top;
      line-height: 1.5;
    }
    table.disc-table tr:hover td { background: #f3edfa; }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      border-radius: 2px;
    }
    .badge-mandatory { background: var(--signal-soft); color: var(--signal); }
    .badge-voluntary { background: #ebe4f5; color: var(--ink-3); }
    .badge-verify { background: var(--warn-bg); color: var(--gold); border: 1px solid #e8d896; }

    .scrollarea { max-height: 70vh; overflow: auto; border: 1px solid var(--line); border-radius: 4px; background: var(--bg-card); }

    .tab-row { display: flex; gap: 4px; border-bottom: 1px solid var(--line); margin-bottom: 24px; flex-wrap: wrap; }
    .tab-btn {
      background: transparent;
      border: none;
      padding: 12px 18px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      color: var(--ink-3);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: all 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .tab-btn:hover { color: var(--ink); }
    .tab-btn.active { color: var(--ink); border-bottom-color: var(--ink); }
    .tab-count { background: var(--bg); padding: 1px 7px; border-radius: 10px; font-size: 11px; color: var(--ink-3); }
    .tab-btn.active .tab-count { background: var(--ink); color: var(--bg); }

    .arc-row { padding: 14px 18px; border-bottom: 1px solid var(--line); display: flex; align-items: flex-start; gap: 16px; }
    .arc-row:hover { background: #f3edfa; }
    .arc-process-header { background: #ebe4f5; padding: 10px 18px; font-weight: 600; font-size: 12px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--ink-2); border-bottom: 1px solid var(--line-2); }

    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

    body::-webkit-scrollbar { width: 8px; height: 8px; }
    body::-webkit-scrollbar-track { background: transparent; }
    body::-webkit-scrollbar-thumb { background: var(--line-2); border-radius: 4px; }
    body::-webkit-scrollbar-thumb:hover { background: var(--ink-4); }

    /* SVG icon sizing helper */
    .icon { display: inline-block; vertical-align: middle; }

    /* Layout grids (class-based so media queries can reach them) */
    .profile-grid { display: grid; grid-template-columns: 1.4fr 1fr; gap: 48px; align-items: start; }
    .archetype-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(min(380px, 100%), 1fr)); gap: 16px; margin-bottom: 32px; }

    /* AI assist panel */
    .ai-panel { margin-top: 12px; padding: 16px; border: 1px solid var(--line-2); border-radius: 6px; background: linear-gradient(180deg, #f6f0fc, #fbf8fe); }
    .ai-spin { width: 14px; height: 14px; border: 2px solid var(--line-2); border-top-color: var(--accent); border-radius: 50%; display: inline-block; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .ai-note { font-size: 12.5px; color: var(--ink-3); line-height: 1.55; }

    /* Coherence warning */
    .warn-row { display: flex; gap: 10px; align-items: flex-start; padding: 12px 14px; background: var(--warn-bg); border: 1px solid #e8d896; border-radius: 4px; font-size: 13px; color: var(--gold); line-height: 1.5; }

    /* Responsive */
    @media (max-width: 860px) {
      .profile-grid { grid-template-columns: 1fr; gap: 32px; }
      .profile-grid aside { position: static !important; }
      .hdr-inner { padding: 24px 20px !important; gap: 16px !important; }
      .main-pad { padding: 0 18px 64px !important; }
      .stage-pad { padding: 0 18px !important; }
      .hero-h1 { font-size: 32px !important; }
      .results-head { flex-direction: column !important; align-items: flex-start !important; }
    }
    @media (max-width: 520px) {
      .hero-h1 { font-size: 27px !important; }
      .nav-hide { display: none !important; }
    }

    /* Loading splash */
    #loading-splash {
      position: fixed; inset: 0;
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      z-index: 10000;
      flex-direction: column; gap: 24px;
    }
    #loading-splash .logo {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 38px;
      letter-spacing: -0.02em;
      color: var(--ink);
    }
    #loading-splash .logo .accent { color: var(--accent); font-weight: 500; }
    #loading-splash .pulse {
      display: inline-block;
      width: 6px; height: 6px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse 1.2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.3; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1.2); }
    }
    #loading-splash .hint {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--ink-4);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
  </style>
</head>

    // ============================================================================
    // ENGINE LOGIC
    // ============================================================================

    // ----------------------------------------------------------------------------
    // JURISDICTION — single source of truth for every applicability decision.
    // The profile form badges, the disclosure filter, and the Mandatory flag all
    // read from these predicates so they can never drift apart.
    // ----------------------------------------------------------------------------
    const JURIS = {
      isEU: (p) => p.geography_hq === 'EU' || (p.geography_operations || []).includes('EU'),
      isIndiaListed: (p) => p.geography_hq === 'India' && (p.listing_status === 'Listed-Major' || p.listing_status === 'Listed-Other'),
      // Post-Omnibus (Directive (EU) 2026/470, in force March 2026): CSRD/ESRS applies only to
      // EU operators above ~1,000 employees and €450M turnover — the "Large" tier here. Listed
      // SMEs were removed from scope, so "in scope" and "mandatory" now coincide. (The original
      // ESRS remains the standard in force for FY2025/26; the simplified ESRS 2.0 applies FY2027.)
      esrsMandatory: (p) => JURIS.isEU(p) && p.size_tier === 'Large',
      esrsInScope: (p) => JURIS.esrsMandatory(p),
      // EU operator below the post-Omnibus threshold — out of CSRD scope (may use voluntary VSME).
      esrsSubThreshold: (p) => JURIS.isEU(p) && p.size_tier !== 'Large',
      // ISSB shows for adopters and TCFD-aligned filers, and for voluntary filers past their first cycle.
      issbInScope: (p) => p.issb_adoption !== 'Voluntary' || p.reporting_maturity !== 'First-time',
      issbMandatory: (p) => p.issb_adoption === 'ISSB-adopting',
    };

    const isMandatory = (disclosureId, profile) => {
      const std = DISCLOSURES[disclosureId]?.standard;
      if (std === 'BRSR') return JURIS.isIndiaListed(profile);
      if (std === 'ESRS') return JURIS.esrsMandatory(profile);
      if (std === 'ISSB-S1' || std === 'ISSB-S2') return JURIS.issbMandatory(profile);
      return false;
    };

    // ----------------------------------------------------------------------------
    // ARCHETYPE SUGGESTION — generation mix + value-chain position pre-select the
    // archetypes that obviously apply. These are suggestions the operator confirms
    // or edits in stage 2; the heuristic auto-scoring from earlier builds stays off.
    // ----------------------------------------------------------------------------
    const FUEL_TO_ARCHETYPE = {
      'Coal': '1_Coal_Thermal',
      'Gas': '2_CCGT', 'Oil': '2_CCGT',
      'Solar-PV': '3_Solar_PV', 'Solar-CSP': '3_Solar_PV',
      'Wind-Onshore': '4_Onshore_Wind', 'Wind-Offshore': '4_Onshore_Wind',
      'Hydro-Reservoir': '5_Hydro_Large', 'Hydro-RoR': '5_Hydro_Large', 'Hydro-Pumped': '5_Hydro_Large',
      'Nuclear': '6_Nuclear',
      'Storage': '7_BESS',
      'Biomass': '13_Biomass_WtE', 'WtE': '13_Biomass_WtE',
    };
    const CHAIN_TO_ARCHETYPE = {
      'Transmission': '8_Transmission',
      'Distribution': '9_Distribution',
      'Retail': '10_Retail_Supply',
      'Trading': '14_Trading',
      'Integrated': '11_Integrated',
      'Storage': '7_BESS',
    };

    const suggestArchetypes = (profile) => {
      const out = new Set();
      for (const f of profile.generation_mix || []) {
        if (FUEL_TO_ARCHETYPE[f]) out.add(FUEL_TO_ARCHETYPE[f]);
      }
      for (const c of profile.value_chain || []) {
        if (CHAIN_TO_ARCHETYPE[c]) out.add(CHAIN_TO_ARCHETYPE[c]);
      }
      // Keep the canonical library order.
      return Object.keys(ARCHETYPES).filter(id => out.has(id));
    };

    // Coherence check: flag fuels the operator declared but didn't pick an archetype for,
    // and archetypes that imply a fuel/segment missing from the profile.
    const coherenceWarnings = (profile, selectedIds) => {
      const warnings = [];
      const selected = new Set(selectedIds);
      for (const f of profile.generation_mix || []) {
        const target = FUEL_TO_ARCHETYPE[f];
        if (target && !selected.has(target)) {
          warnings.push(`You listed ${f} in your generation mix but didn't select "${ARCHETYPES[target].name}".`);
        }
      }
      const needsGen = (profile.value_chain || []).some(v => v === 'Generation' || v === 'Integrated');
      if (needsGen && !selectedIds.some(id => ARCHETYPES[id]?.tags?.value_chain?.includes('Generation'))) {
        warnings.push('Your profile includes generation, but none of the selected archetypes is a generation technology.');
      }
      return warnings;
    };

    const stitchArchitecture = (selectedIds) => {
      const rows = [];
      const seen = new Set();
      for (const id of selectedIds) {
        const archetype = ARCHETYPES[id];
        if (!archetype) continue;
        for (const row of archetype.rows) {
          const key = `${id}|${row.sub_id}`;
          if (!seen.has(key)) {
            rows.push({ ...row, source_archetype: id, archetype_name: archetype.name, row_id: key });
            seen.add(key);
          }
        }
      }
      return rows;
    };

    const filterApplies = (disclosureId, profile) => {
      const std = DISCLOSURES[disclosureId]?.standard;
      if (std === 'BRSR') return JURIS.isIndiaListed(profile);
      if (std === 'ESRS') return JURIS.esrsInScope(profile);
      if (std === 'ISSB-S1' || std === 'ISSB-S2') return JURIS.issbInScope(profile);
      return true;
    };

    const mapDisclosures = (architecture, profile) => {
      const hits = [];
      const seenKeys = new Set();

      for (const row of architecture) {
        const archetypeMaps = MAPPINGS[row.source_archetype] || {};
        const subMaps = archetypeMaps[row.sub_id] || [];
        // Nearest preceding process header (rows are ordered; the header is the row
        // with a process_id whose sub_id is the greatest one <= this row's sub_id).
        const procCandidates = (ARCHETYPES[row.source_archetype]?.rows || [])
          .filter(r => r.process_id !== null && parseFloat(r.sub_id) <= parseFloat(row.sub_id));
        const fallbackProcess = procCandidates.length ? procCandidates[procCandidates.length - 1].process_name : row.phase;
        for (const did of subMaps) {
          if (!filterApplies(did, profile)) continue;
          const disc = DISCLOSURES[did];
          if (!disc) continue;
          const key = `${row.row_id}|${did}`;
          if (seenKeys.has(key)) continue;
          seenKeys.add(key);
          hits.push({
            process_name: row.process_name || fallbackProcess,
            sub_id: row.sub_id,
            phase: row.phase,
            archetype: row.archetype_name,
            archetype_id: row.source_archetype,
            disclosure_id: did,
            standard: disc.standard,
            code: disc.code,
            name: disc.name,
            unit: disc.unit,
            pillar: disc.pillar,
            mandatory: isMandatory(did, profile),
            source: 'knowledge_graph',
          });
        }
      }

      const universal = MAPPINGS['*ALL'] || {};
      for (const [bucket, dids] of Object.entries(universal)) {
        if (bucket.endsWith('-IN') && profile.geography_hq !== 'India') continue;
        for (const did of dids) {
          if (!filterApplies(did, profile)) continue;
          const disc = DISCLOSURES[did];
          if (!disc) continue;
          const key = `*ALL|${bucket}|${did}`;
          if (seenKeys.has(key)) continue;
          seenKeys.add(key);
          const bucketLabel = {
            'GOV-1': 'Governance Baseline',
            'GOV-1-IN': 'Governance Baseline',
            'WRK-1': 'Workforce Baseline',
            'WRK-1-IN': 'Workforce Baseline',
            'ISSB-1': 'ISSB Baseline',
            'MAT-1': 'Materiality',
          }[bucket] || bucket;
          hits.push({
            process_name: 'Cross-cutting',
            sub_id: '—',
            phase: bucketLabel,
            archetype: 'Universal',
            archetype_id: '*ALL',
            disclosure_id: did,
            standard: disc.standard,
            code: disc.code,
            name: disc.name,
            unit: disc.unit,
            pillar: disc.pillar,
            mandatory: isMandatory(did, profile),
            source: 'knowledge_graph',
          });
        }
      }

      return hits;
    };

    const downloadExcel = (state) => {
      const profile = state.profile;
      const allHits = state.hits;
      const wb = XLSX.utils.book_new();

      const profileRows = [
        ['Field', 'Value'],
        ['Company Name', profile.company_name || ''],
        ['Value Chain', (profile.value_chain || []).join('; ')],
        ['Generation Mix', (profile.generation_mix || []).join('; ')],
        ['HQ Geography', profile.geography_hq || ''],
        ['Operating Geographies', (profile.geography_operations || []).join('; ')],
        ['Listing Status', profile.listing_status || ''],
        ['Size Tier', profile.size_tier || ''],
        ['ISSB Adoption', profile.issb_adoption || ''],
        ['Reporting Maturity', profile.reporting_maturity || ''],
        ['', ''],
        ['About Us (excerpt)', (profile.about_us_text || '').slice(0, 500)],
        ['', ''],
        ['Generated', new Date().toISOString()],
        ['Library Version', 'v5'],
        ['Knowledge Graph Version', 'v5'],
      ];
      XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(profileRows), 'Company Profile');

      const archRows = [['Archetype', 'Process ID', 'Process Name', 'Sub-Process ID', 'Sub-Process Phase', 'Action Verbs']];
      for (const row of state.architecture) {
        archRows.push([row.archetype_name, row.process_id || '', row.process_name || '', row.sub_id, row.phase, row.verbs]);
      }
      XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(archRows), 'Process Architecture');

      const mapRows = [['Process', 'Sub-Process Phase', 'Sub-ID', 'Archetype', 'Standard', 'Code', 'Indicator', 'Unit', 'Pillar', 'Mandatory', 'Data Owner', 'Status']];
      for (const hit of allHits) {
        mapRows.push([hit.process_name, hit.phase, hit.sub_id, hit.archetype, hit.standard, hit.code, hit.name, hit.unit, hit.pillar, hit.mandatory ? 'Mandatory' : 'Voluntary', '', 'Not Started']);
      }
      XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(mapRows), 'Disclosure Map');

      const standards = [...new Set(allHits.map(h => h.standard))];
      for (const std of standards) {
        const stdHits = allHits.filter(h => h.standard === std);
        const stdRows = [['Code', 'Indicator', 'Unit', 'Pillar', 'Process', 'Sub-Process', 'Mandatory']];
        for (const hit of stdHits) {
          stdRows.push([hit.code, hit.name, hit.unit, hit.pillar, hit.process_name, hit.phase, hit.mandatory ? 'Yes' : 'No']);
        }
        XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(stdRows), `Std_${std}`.slice(0, 31));
      }

      const overlapMap = new Map();
      for (const hit of allHits) {
        const key = `${hit.pillar}|${hit.name}`;
        if (!overlapMap.has(key)) overlapMap.set(key, { pillar: hit.pillar, dataPoint: hit.name, unit: hit.unit, standards: new Set(), codes: [] });
        const e = overlapMap.get(key);
        e.standards.add(hit.standard);
        e.codes.push(`${hit.standard}:${hit.code}`);
      }
      const overlapRows = [['Pillar', 'Data Point', 'Unit', '# Standards', 'Standards Covered', 'All Codes']];
      for (const e of [...overlapMap.values()].sort((a, b) => b.standards.size - a.standards.size)) {
        overlapRows.push([e.pillar, e.dataPoint, e.unit, e.standards.size, [...e.standards].join(', '), e.codes.join('; ')]);
      }
      XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(overlapRows), 'Overlap & Gaps');

      const uniquePoints = new Map();
      for (const hit of allHits) {
        const key = `${hit.name}|${hit.unit}`;
        if (!uniquePoints.has(key)) uniquePoints.set(key, { name: hit.name, unit: hit.unit, standards: new Set() });
        uniquePoints.get(key).standards.add(hit.standard);
      }
      const dcpRows = [['Data Point', 'Unit', '# Standards Satisfied', 'Standards', 'Data Owner', 'Frequency', 'Source System', 'Assurance Level', 'Notes']];
      for (const p of [...uniquePoints.values()].sort((a, b) => b.standards.size - a.standards.size)) {
        dcpRows.push([p.name, p.unit, p.standards.size, [...p.standards].join(', '), '', '', '', '', '']);
      }
      XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(dcpRows), 'Data Collection Plan');

      XLSX.writeFile(wb, `ESG_Disclosures_${(profile.company_name || 'Company').replace(/[^a-z0-9]/gi, '_')}.xlsx`);
    };

    // ============================================================================
    // UI COMPONENTS
    // ============================================================================

    const VOCAB = {
      value_chain: ['Generation', 'Transmission', 'Distribution', 'Retail', 'Trading', 'Integrated', 'Storage'],
      generation_mix: ['Coal', 'Gas', 'Oil', 'Nuclear', 'Hydro-Reservoir', 'Hydro-RoR', 'Hydro-Pumped', 'Solar-PV', 'Solar-CSP', 'Wind-Onshore', 'Wind-Offshore', 'Biomass', 'WtE', 'Geothermal', 'Storage'],
      geography: ['EU', 'India', 'US', 'UK', 'Japan', 'Singapore', 'Other-Asia', 'Other-Americas', 'MENA', 'SSA'],
      listing_status: ['Listed-Major', 'Listed-Other', 'Private', 'PSU-State', 'Subsidiary'],
      size_tier: ['Large', 'Medium', 'SME-Listed', 'SME-Private'],
      issb_adoption: ['ISSB-adopting', 'TCFD-aligned', 'Voluntary'],
      reporting_maturity: ['First-time', 'Established', 'Leadership'],
    };

    // ----------------------------------------------------------------------------
    // PROFILE EXTRACTION FROM FREE TEXT
    // Primary path: a single Claude call returns a profile constrained to the VOCAB
    // enums. This runs live inside Claude; in a self-hosted copy the call is blocked,
    // so we fall back to deterministic keyword detection. Both feed applyExtracted,
    // and the engine stays deterministic — extraction only pre-fills the form.
    // ----------------------------------------------------------------------------
    const localExtract = (text) => {
      const t = (text || '').toLowerCase();
      const has = (...words) => words.some(w => t.includes(w));
      const out = {};
      const vc = [];
      if (has('generat', 'power plant', 'power station')) vc.push('Generation');
      if (has('transmission', 'grid operator', 'high-voltage', 'high voltage')) vc.push('Transmission');
      if (has('distribution', 'discom', 'last mile', 'last-mile')) vc.push('Distribution');
      if (has('retail', 'supply electricity', 'electricity supplier', 'energy supplier')) vc.push('Retail');
      if (has('trading', 'wholesale market', 'power trading')) vc.push('Trading');
      if (has('integrated utility', 'vertically integrated')) vc.push('Integrated');
      if (has('battery storage', 'energy storage', 'bess')) vc.push('Storage');
      if (vc.length) out.value_chain = [...new Set(vc)];

      const gm = [];
      if (has('coal', 'lignite', 'thermal')) gm.push('Coal');
      if (has('gas', 'ccgt', 'combined cycle', 'lng')) gm.push('Gas');
      if (has('oil', 'diesel')) gm.push('Oil');
      if (has('nuclear')) gm.push('Nuclear');
      if (has('reservoir hydro', 'large hydro', 'dam')) gm.push('Hydro-Reservoir');
      if (has('run-of-river', 'run of river')) gm.push('Hydro-RoR');
      if (has('pumped hydro', 'pumped storage')) gm.push('Hydro-Pumped');
      else if (has('hydro', 'hydroelectric')) gm.push('Hydro-Reservoir');
      if (has('solar pv', 'photovoltaic', 'solar')) gm.push('Solar-PV');
      if (has('concentrated solar', 'csp')) gm.push('Solar-CSP');
      if (has('offshore wind')) gm.push('Wind-Offshore');
      if (has('onshore wind') || (has('wind') && !has('offshore wind'))) gm.push('Wind-Onshore');
      if (has('biomass', 'bagasse', 'agri-residue')) gm.push('Biomass');
      if (has('waste-to-energy', 'waste to energy', 'municipal waste')) gm.push('WtE');
      if (has('geothermal')) gm.push('Geothermal');
      if (gm.length) out.generation_mix = [...new Set(gm)];

      const geo = [];
      if (has('india', 'indian')) geo.push('India');
      if (has('european union', ' eu ', 'germany', 'france', 'spain', 'italy', 'netherlands', 'poland')) geo.push('EU');
      if (has('united states', ' u.s', ' usa', 'america')) geo.push('US');
      if (has('united kingdom', ' uk ', 'britain', 'england')) geo.push('UK');
      if (has('japan')) geo.push('Japan');
      if (has('singapore')) geo.push('Singapore');
      if (geo.length) { out.geography_hq = geo[0]; out.geography_operations = [...new Set(geo)]; }

      if (has('listed on', 'publicly traded', 'stock exchange', 'nse', 'bse', 'nyse', 'lse')) out.listing_status = 'Listed-Major';
      else if (has('state-owned', 'public sector', 'psu', 'government-owned')) out.listing_status = 'PSU-State';
      else if (has('subsidiary', 'wholly owned')) out.listing_status = 'Subsidiary';
      else if (has('privately held', 'private company')) out.listing_status = 'Private';

      if (has('largest', 'multinational', 'fortune', 'gw of', 'gigawatt')) out.size_tier = 'Large';

      if (has('issb', 'ifrs s1', 'ifrs s2')) out.issb_adoption = 'ISSB-adopting';
      else if (has('tcfd')) out.issb_adoption = 'TCFD-aligned';
      return out;
    };

    const aiExtract = async (text) => {
      const allowed = JSON.stringify({
        value_chain: VOCAB.value_chain, generation_mix: VOCAB.generation_mix,
        geography: VOCAB.geography, listing_status: VOCAB.listing_status,
        size_tier: VOCAB.size_tier, issb_adoption: VOCAB.issb_adoption,
      });
      const prompt = `You are scoping a utility company's ESG reporting profile. Read the company description below and return ONLY a JSON object (no prose, no markdown fences) with these keys, choosing values strictly from the allowed enums:

{
  "value_chain": [subset of value_chain],
  "generation_mix": [subset of generation_mix, only if it operates generation],
  "geography_hq": one value from geography (best guess for headquarters),
  "geography_operations": [subset of geography],
  "listing_status": one value from listing_status,
  "size_tier": one value from size_tier,
  "issb_adoption": one value from issb_adoption,
  "rationale": one short sentence
}

Omit any key you cannot infer. Allowed enums: ${allowed}

Company description:
"""${text.slice(0, 6000)}"""`;

      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 1000,
          messages: [{ role: 'user', content: prompt }],
        }),
      });
      if (!res.ok) throw new Error('api ' + res.status);
      const data = await res.json();
      const raw = (data.content || []).map(b => b.type === 'text' ? b.text : '').join('').trim();
      const clean = raw.replace(/```json|```/g, '').trim();
      const parsed = JSON.parse(clean);
      // Keep only values that are inside the allowed vocab.
      const inVocab = (v, list) => list.includes(v);
      const out = {};
      if (Array.isArray(parsed.value_chain)) out.value_chain = parsed.value_chain.filter(v => inVocab(v, VOCAB.value_chain));
      if (Array.isArray(parsed.generation_mix)) out.generation_mix = parsed.generation_mix.filter(v => inVocab(v, VOCAB.generation_mix));
      if (inVocab(parsed.geography_hq, VOCAB.geography)) out.geography_hq = parsed.geography_hq;
      if (Array.isArray(parsed.geography_operations)) out.geography_operations = parsed.geography_operations.filter(v => inVocab(v, VOCAB.geography));
      if (inVocab(parsed.listing_status, VOCAB.listing_status)) out.listing_status = parsed.listing_status;
      if (inVocab(parsed.size_tier, VOCAB.size_tier)) out.size_tier = parsed.size_tier;
      if (inVocab(parsed.issb_adoption, VOCAB.issb_adoption)) out.issb_adoption = parsed.issb_adoption;
      out.__rationale = typeof parsed.rationale === 'string' ? parsed.rationale : '';
      return out;
    };

    function ArchitectureEditor({ architecture, setArchitecture, onBack, onNext }) {
      const [editingRow, setEditingRow] = useState(null);

      const removeRow = (rowId) => setArchitecture(a => a.filter(r => r.row_id !== rowId));
      const updateRowVerbs = (rowId, verbs) => setArchitecture(a => a.map(r => r.row_id === rowId ? { ...r, verbs } : r));

      const grouped = useMemo(() => {
        const out = [];
        let lastArchetype = null;
        let lastProcessHeader = null;
        for (const row of architecture) {
          if (row.source_archetype !== lastArchetype) {
            out.push({ type: 'archetype', name: row.archetype_name, id: row.source_archetype });
            lastArchetype = row.source_archetype;
            lastProcessHeader = null;
          }
          if (row.process_id !== null && row.process_name !== lastProcessHeader) {
            out.push({ type: 'process', name: row.process_name, id: `${row.source_archetype}-${row.process_id}` });
            lastProcessHeader = row.process_name;
          }
          out.push({ type: 'row', row });
        }
        return out;

        <div className="fade-in">
          <div style={{ marginBottom: 32 }}>
            <h1 className="display-font" style={{ fontSize: 38, fontWeight: 400, lineHeight: 1.15, marginBottom: 8, color: 'var(--ink)' }}>

                  <div key={`a-${item.id}-${idx}`} style={{ background: 'var(--ink)', color: 'var(--bg)', padding: '12px 18px', display: 'flex', alignItems: 'center', gap: 10 }}>
                    <Layers size={14} />
                    <span className="display-font" style={{ fontSize: 16, fontWeight: 500 }}>{item.name}</span>
                    <span className="mono" style={{ fontSize: 11, color: 'var(--ink-4)', marginLeft: 8 }}>{item.id}</span>
                  </div>
                );
              }
              if (item.type === 'process') {
                return (
                  <div key={`p-${item.id}-${idx}`} className="arc-process-header">
                    {item.name}
                  </div>
                );
              }
              const row = item.row;
              const isEditing = editingRow === row.row_id;
              return (
                <div key={row.row_id} className="arc-row">
                  <div className="mono" style={{ fontSize: 12, color: 'var(--ink-4)', minWidth: 32, paddingTop: 2 }}>{row.sub_id}</div>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontSize: 14, fontWeight: 600, color: 'var(--ink)', marginBottom: 4 }}>{row.phase}</div>

                        className="field-input"
                        style={{ fontSize: 13, padding: '8px 10px' }}
                        value={row.verbs}
                        onChange={e => updateRowVerbs(row.row_id, e.target.value)}

                        onKeyDown={e => { if (e.key === 'Enter') setEditingRow(null); }}

                      <div style={{ fontSize: 13, color: 'var(--ink-2)', lineHeight: 1.5 }}>
                        {row.verbs}

                    )}

                  <div style={{ display: 'flex', gap: 4 }}>
                    <button className="btn-ghost" title="Edit verbs" onClick={() => setEditingRow(row.row_id)}>
                      <Edit2 size={13} />
                    </button>

    function DisclosureResults({ hits, profile, architecture, onBack, onReset }) {
      const [activeTab, setActiveTab] = useState('all');
      const [downloading, setDownloading] = useState(false);

      const stats = useMemo(() => {
        const byStandard = {};
        for (const h of hits) {
          byStandard[h.standard] = (byStandard[h.standard] || 0) + 1;
        }
        const mandatory = hits.filter(h => h.mandatory).length;
        const uniqueDataPoints = new Set(hits.map(h => `${h.name}|${h.unit}`)).size;
        const consolidation = uniqueDataPoints ? (hits.length / uniqueDataPoints) : 0;
        return { byStandard, mandatory, uniqueDataPoints, total: hits.length, consolidation };
      }, [hits]);

      const overlapData = useMemo(() => {
        const map = new Map();
        for (const h of hits) {
          const key = `${h.pillar}|${h.name}`;
          if (!map.has(key)) map.set(key, { pillar: h.pillar, name: h.name, unit: h.unit, standards: new Set(), codes: [] });
          const e = map.get(key);
          e.standards.add(h.standard);
          e.codes.push({ std: h.standard, code: h.code });
        }
        return [...map.values()].sort((a, b) => b.standards.size - a.standards.size);
      }, [hits]);

      const filteredHits = useMemo(() => {
        if (activeTab === 'all') return hits;
        if (activeTab === 'mandatory') return hits.filter(h => h.mandatory);
        return hits.filter(h => h.standard === activeTab);
      }, [hits, activeTab]);

      const handleDownload = () => {
        setDownloading(true);
        try {
          downloadExcel({ profile, architecture, hits });
        } catch (e) {
          console.error('Download failed', e);
          alert('Excel generation failed. Check the console.');

        setDownloading(false);

            </div>
            <button className="btn-primary" onClick={handleDownload} disabled={downloading}>

            <Stat label="Mandatory" value={stats.mandatory} highlight />

            <Stat label="Standards" value={Object.keys(stats.byStandard).length} />

            <button className={`tab-btn ${activeTab === 'mandatory' ? 'active' : ''}`} onClick={() => setActiveTab('mandatory')}>

              <GitBranch size={13} /> Overlap analysis

          </div>

          {activeTab === 'overlap' ? (
            <div className="scrollarea">
              <table className="disc-table">
                <thead>
                  <tr>
                    <th>Pillar</th>
                    <th>Data point</th>
                    <th>Unit</th>
                    <th style={{ textAlign: 'center' }}># Standards</th>

                </div>
              </div>
            </div>
          ) : (
            <div className="scrollarea">
              <table className="disc-table">
                <thead>
                  <tr>
                    <th style={{ width: 90 }}>Standard</th>
                    <th style={{ width: 130 }}>Code</th>
                    <th>Indicator</th>
                    <th style={{ width: 110 }}>Unit</th>
                    <th>Triggered by</th>
                    <th style={{ width: 110 }}>Status</th>
                  </tr>
                </thead>
                <tbody>
                  {filteredHits.map((h, i) => (
                    <tr key={`${h.disclosure_id}-${h.archetype_id}-${h.sub_id}-${i}`}>
                      <td><span className="mono" style={{ fontSize: 11, fontWeight: 600 }}>{h.standard}</span></td>
                      <td>
                        <span className="mono" style={{ fontSize: 11, color: 'var(--ink-2)' }}>{h.code.replace(' [VERIFY]', '')}</span>
                        {h.code.includes('[VERIFY]') && <span className="badge badge-verify" style={{ marginLeft: 6 }} title="Indicator name and unit are confirmed; the exact code string should be checked against the latest official standard text before filing.">verify code</span>}

                      </td>

            </div>

          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginTop: 32 }}>

          <div style={{ marginTop: 48, padding: 24, background: 'var(--bg-card)', border: '1px solid var(--line)', borderRadius: 4 }}>
            <div style={{ fontSize: 11, letterSpacing: '0.08em', textTransform: 'uppercase', color: 'var(--ink-4)', fontWeight: 600, marginBottom: 12, display: 'flex', alignItems: 'center', gap: 6 }}>
              <Sparkles size={12} /> Production roadmap

            <p style={{ fontSize: 13, color: 'var(--ink-3)', lineHeight: 1.65, margin: 0 }}>
              This prototype runs the full deterministic pipeline — profile → architecture → mapping → deliverable — with optional Claude-assisted profile pre-fill from a pasted business description. The next step is LLM gap-fill for sub-processes the knowledge graph doesn't yet cover. A <span className="badge badge-verify">verify code</span> tag marks indicators whose name and unit are confirmed but whose exact code string predates the latest standard revision — confirm those against the official text before filing.

              display: 'flex',
              justifyContent: 'space-between',
              alignItems: 'flex-start',
              gap: 24,
              color: 'var(--ink)',
            }}
          >
            <span className="display-font" style={{ fontSize: 19, fontWeight: 500, lineHeight: 1.35, letterSpacing: '-0.005em' }}>
              {item.q}
            </span>
            <span style={{
              fontSize: 24,
              color: 'var(--accent)',
              fontFamily: 'Inter, system-ui, sans-serif',
              fontWeight: 300,
              lineHeight: 1,
              transition: 'transform 0.2s',
              transform: isOpen ? 'rotate(45deg)' : 'rotate(0)',
              flexShrink: 0,
              marginTop: 2,
            }}>+</span>
          </button>
          {isOpen && (
            <div className="fade-in" style={{ padding: '0 4px 24px', fontSize: 15, color: 'var(--ink-2)', lineHeight: 1.75, maxWidth: 760 }}>
              {item.a}
            </div>
          )}
        </div>
      );
    }

    function FAQPage({ onStart }) {
      const [openIdx, setOpenIdx] = useState(0);
      return (
        <div className="fade-in" style={{ maxWidth: 880, margin: '0 auto', padding: '24px 0 0' }}>
          <div style={{ marginBottom: 40 }}>
            <div className="mono" style={{ fontSize: 11, letterSpacing: '0.1em', textTransform: 'uppercase', color: 'var(--ink-4)', marginBottom: 16 }}>
              Frequently asked
            </div>
            <h1 className="display-font" style={{ fontSize: 52, fontWeight: 400, lineHeight: 1.05, marginBottom: 20, color: 'var(--ink)', letterSpacing: '-0.025em' }}>
              Questions, <span style={{ color: 'var(--accent)', fontWeight: 500 }}>answered</span>.
            </h1>
            <p style={{ fontSize: 16, color: 'var(--ink-3)', lineHeight: 1.6, maxWidth: 680, margin: 0 }}>
              What the tool covers, how it scopes disclosures, and what it isn't.
            </p>
          </div>

          <div style={{ borderTop: '1px solid var(--line)', marginBottom: 48 }}>
            {FAQ_ITEMS.map((item, idx) => (
              <FAQItem
                key={idx}
                item={item}
                isOpen={openIdx === idx}
                onToggle={() => setOpenIdx(openIdx === idx ? -1 : idx)}
              />
            ))}
          </div>

          <div style={{ padding: 28, background: 'var(--bg-card)', border: '1px solid var(--line)', borderRadius: 4, display: 'flex', justifyContent: 'space-between', alignItems: 'center', gap: 24, flexWrap: 'wrap' }}>
            <div style={{ fontSize: 14, color: 'var(--ink-3)' }}>
              Couldn't find what you were looking for? The fastest answer is usually to try the tool.
            </div>
            <button className="btn-primary" onClick={onStart}>
              Open the tool <ChevronRight size={16} />
            </button>
          </div>
        </div>
      );
    }

    // ============================================================================
    // MAIN APP
    // ============================================================================

    function App() {
      const [view, setView] = useState('tool'); // 'tool' | 'about' | 'faq'
      const [stage, setStage] = useState(1);
      const [profile, setProfile] = useState({
        company_name: '',
        data_collection_mode: 'Quick',
        about_us_text: '',
        value_chain: [],
        generation_mix: [],
        geography_hq: '',
        geography_operations: [],
        listing_status: '',
        size_tier: '',
        issb_adoption: 'Voluntary',
        reporting_maturity: 'First-time',
      });
      const [selectedArchetypes, setSelectedArchetypes] = useState([]);
      const [architecture, setArchitecture] = useState([]);
      const [hits, setHits] = useState([]);
      const [profileError, setProfileError] = useState('');

      const updateProfile = (field, value) => setProfile(p => ({ ...p, [field]: value }));

      // Merge a partial profile extracted from free text (AI or local fallback).
      // Only fills fields the extractor is confident about; never clobbers company name.
      const applyExtracted = (fields) => {
        setProfile(p => {
          const next = { ...p };
          for (const [k, v] of Object.entries(fields)) {
            if (k === 'company_name') continue;
            if (Array.isArray(v) ? v.length : v) next[k] = v;
          }
          return next;
        });
      };

      const proceedToStage2 = () => {
        if (!profile.company_name?.trim()) { setProfileError('Company name is required'); return; }
        if (!profile.value_chain?.length) { setProfileError('Select at least one value chain segment'); return; }
        const needsGenMix = profile.value_chain.includes('Generation') || profile.value_chain.includes('Integrated');
        if (needsGenMix && !profile.generation_mix?.length) { setProfileError('Generation mix is required when Generation or Integrated is selected'); return; }
        if (!profile.geography_hq) { setProfileError('HQ geography is required'); return; }
        if (!profile.geography_operations?.length) { setProfileError('At least one operating geography is required'); return; }
        if (!profile.listing_status) { setProfileError('Listing status is required'); return; }
        if (!profile.size_tier) { setProfileError('Size tier is required'); return; }
        setProfileError('');
        // Pre-select the archetypes implied by the profile. The operator confirms or edits
        // these in stage 2 — nothing is locked in. Only seed when nothing is chosen yet.
        setSelectedArchetypes(prev => prev.length ? prev : suggestArchetypes(profile));
        setStage(2);
        window.scrollTo({ top: 0, behavior: 'smooth' });
      };

      const proceedToStage3 = () => {
        const arch = stitchArchitecture(selectedArchetypes);
        setArchitecture(arch);
        setStage(3);
        window.scrollTo({ top: 0, behavior: 'smooth' });
      };

      const proceedToStage4 = () => {
        const computed = mapDisclosures(architecture, profile);
        setHits(computed);
        setStage(4);
        window.scrollTo({ top: 0, behavior: 'smooth' });
      };

      const goBack = () => { setStage(s => Math.max(1, s - 1)); window.scrollTo({ top: 0, behavior: 'smooth' }); };
      const jumpToStage = (target) => { if (target < stage) { setStage(target); window.scrollTo({ top: 0, behavior: 'smooth' }); } };
      const reset = () => {
        setStage(1);
        setProfile({ company_name: '', data_collection_mode: 'Quick', about_us_text: '', value_chain: [], generation_mix: [], geography_hq: '', geography_operations: [], listing_status: '', size_tier: '', issb_adoption: 'Voluntary', reporting_maturity: 'First-time' });
        setArchitecture([]); setHits([]); setSelectedArchetypes([]);
        window.scrollTo({ top: 0, behavior: 'smooth' });
      };

      const showGenMix = profile.value_chain.includes('Generation') || profile.value_chain.includes('Integrated');

      // Remove splash once mounted
      useEffect(() => {
        const splash = document.getElementById('loading-splash');
        if (splash) splash.style.display = 'none';
      }, []);

      return (
        <Fragment>
          <header style={{ borderBottom: '1px solid var(--line)', background: 'var(--bg)' }}>
            <div className="hdr-inner" style={{ maxWidth: 1280, margin: '0 auto', padding: '40px 48px', display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 32, flexWrap: 'wrap' }}>
              <div onClick={() => setView('tool')} style={{ cursor: 'pointer' }}>
                <div className="display-font" style={{ fontSize: 42, fontWeight: 500, color: 'var(--ink)', lineHeight: 1.05, letterSpacing: '-0.02em' }}>
                  Materiality<span style={{ color: 'var(--accent)', fontWeight: 500 }}> Map</span>
                </div>
                <div className="mono" style={{ fontSize: 12, color: 'var(--ink-4)', letterSpacing: '0.1em', textTransform: 'uppercase', marginTop: 8 }}>
                  ESG Disclosure Engine · Utilities · Demo
                </div>
              </div>
              <nav style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
                {[
                  { id: 'tool', label: 'Tool' },
                  { id: 'about', label: 'About' },
                  { id: 'faq', label: 'FAQ' },
                ].map(item => (
                  <button
                    key={item.id}
                    onClick={() => setView(item.id)}
                    style={{
                      background: 'transparent',
                      border: 'none',
                      padding: '12px 22px',
                      fontFamily: 'inherit',
                      fontSize: 16,
                      fontWeight: 500,
                      letterSpacing: '0.01em',
                      color: view === item.id ? 'var(--ink)' : 'var(--ink-3)',
                      cursor: 'pointer',
                      borderBottom: `2px solid ${view === item.id ? 'var(--accent)' : 'transparent'}`,
                      transition: 'color 0.15s, border-color 0.15s',
                    }}
                  >
                    {item.label}
                  </button>
                ))}
              </nav>
              <div style={{ display: 'flex', gap: 24, alignItems: 'center' }}>
                <div className="mono nav-hide" style={{ fontSize: 13, color: 'var(--ink-4)', letterSpacing: '0.04em' }}>
                  v5 · {Object.keys(ARCHETYPES).length} archetypes · {Object.keys(DISCLOSURES).length} indicators
                </div>
                {view === 'tool' && stage > 1 && (
                  <button className="btn-ghost" onClick={reset} style={{ fontSize: 14 }}>Reset</button>
                )}
              </div>
            </div>
          </header>

          {view === 'tool' && (
            <div className="stage-pad" style={{ maxWidth: 1280, margin: '0 auto', padding: '0 32px' }}>
              <StageIndicator current={stage} onJump={jumpToStage} />
            </div>
          )}

          <main className="main-pad" style={{ maxWidth: 1280, margin: '0 auto', padding: '0 32px 80px' }}>
            {view === 'about' && <AboutPage onStart={() => setView('tool')} />}
            {view === 'faq' && <FAQPage onStart={() => setView('tool')} />}

            {view === 'tool' && stage === 1 && (
              <ProfileForm
                profile={profile}
                updateProfile={updateProfile}
                applyExtracted={applyExtracted}
                showGenMix={showGenMix}
                onNext={proceedToStage2}
                error={profileError}
              />
            )}

            {view === 'tool' && stage === 2 && (
              <ArchetypeSelection
                selected={selectedArchetypes}
                setSelected={setSelectedArchetypes}
                profile={profile}
                onBack={goBack}
                onNext={proceedToStage3}
              />
            )}

            {view === 'tool' && stage === 3 && (
              <ArchitectureEditor
                architecture={architecture}
                setArchitecture={setArchitecture}
                onBack={goBack}
                onNext={proceedToStage4}
              />
            )}

            {view === 'tool' && stage === 4 && (
              <DisclosureResults
                hits={hits}
                profile={profile}
                architecture={architecture}
                onBack={goBack}
                onReset={reset}
              />
            )}
          </main>

          <footer style={{ borderTop: '1px solid var(--line)', background: 'var(--bg)', marginTop: 'auto' }}>
            <div style={{ maxWidth: 1280, margin: '0 auto', padding: '24px 32px', display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 16, flexWrap: 'wrap' }}>
              <div className="mono" style={{ fontSize: 11, color: 'var(--ink-4)', letterSpacing: '0.08em', textTransform: 'uppercase' }}>
                Built by <span style={{ color: 'var(--accent)', fontWeight: 600 }}>Sattvi</span> for Utilities
              </div>
              <div className="mono" style={{ fontSize: 11, color: 'var(--ink-4)', letterSpacing: '0.06em' }}>
                © {new Date().getFullYear()} · All rights reserved
              </div>
            </div>
          </footer>
        </Fragment>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
